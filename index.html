<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>باسقات الجزيرة للتمور والحلويات - عبدالله البلوشي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e2a1a, #3a4d30);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            direction: rtl;
            padding: 20px;
        }

        .business-card {
            width: 650px;
            max-width: 100%;
            background: #73704F;
            border-radius: 32px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            transition: transform 0.25s ease;
        }

        .business-card:hover {
            transform: translateY(-4px);
        }

        .card-header {
            background: linear-gradient(135deg, #5a5840, #73704F);
            padding: 22px 25px;
            text-align: center;
        }

        .logo-text {
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: #F5F0E0;
            text-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .logo-sub {
            font-size: 0.8rem;
            color: rgba(245,240,224,0.85);
            margin-top: 6px;
            font-weight: 400;
        }

        .card-body {
            padding: 28px 30px;
            background: #73704F;
        }

        .contact-name {
            font-size: 1.75rem;
            font-weight: 700;
            color: #F5F0E0;
            border-right: 5px solid #F5F0E0;
            padding-right: 16px;
            margin-bottom: 8px;
        }

        .job-title {
            font-size: 1rem;
            color: #F5F0E0;
            font-weight: 600;
            margin-bottom: 25px;
            padding-right: 21px;
            letter-spacing: 0.3px;
            opacity: 0.85;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .info-icon {
            width: 44px;
            height: 44px;
            background: rgba(245,240,224,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #F5F0E0;
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .info-text {
            flex: 1;
            font-size: 1rem;
            color: #F5F0E0;
            text-decoration: none;
            font-weight: 500;
            word-break: break-word;
        }

        .info-text a {
            text-decoration: none;
            color: #F5F0E0;
            transition: color 0.2s;
        }

        .info-text a:hover {
            color: #d4cfb0;
        }

        .whatsapp-btn {
            background-color: #25D366;
            color: #1a1a1a !important;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .whatsapp-btn:hover {
            background-color: #1da15a;
            color: white !important;
        }

        .vcf-btn {
            background-color: #3d3b28;
            color: #F5F0E0;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border: none;
            font-family: inherit;
            font-weight: 600;
            transition: 0.2s;
        }

        .vcf-btn:hover {
            background-color: #2a281c;
            transform: scale(0.97);
        }

        .website-link {
            background: rgba(245,240,224,0.15);
            border: 1px solid #F5F0E0;
            color: #F5F0E0 !important;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .website-link:hover {
            background: rgba(245,240,224,0.3);
        }

        hr {
            margin: 20px 0;
            border: none;
            height: 2px;
            background: linear-gradient(to left, #F5F0E0, #3d3b28, #F5F0E0);
            border-radius: 5px;
        }

        .footer-note {
            font-size: 0.7rem;
            color: #F5F0E0;
            text-align: center;
            margin-top: 12px;
            opacity: 0.85;
            font-weight: 500;
        }

        @media (max-width: 500px) {
            .card-body {
                padding: 20px;
            }
            .contact-name {
                font-size: 1.4rem;
            }
            .info-icon {
                width: 38px;
                height: 38px;
            }
        }
    </style>
</head>
<body>
    <div class="business-card">
        <div class="card-header">
            <div class="logo-text">باسقات الجزيرة</div>
            <div class="logo-sub">BASQAT ALJAZEERA</div>
        </div>
        <div class="card-body">
            <div class="contact-name">عبدالله البلوشي</div>
            <div class="job-title">منسق المعرض</div>

            <div class="info-row">
                <div class="info-icon"><i class="fas fa-address-card"></i></div>
                <div class="info-text">
                    <button class="vcf-btn" id="saveVcfBtn">
                        <i class="fas fa-download"></i> حفظ جهة اتصال (VCF)
                    </button>
                </div>
            </div>

            <div class="info-row">
                <div class="info-icon"><i class="fab fa-whatsapp"></i></div>
                <div class="info-text">
                    <a href="https://wa.me/966555822559?text=مرحباً%20عبدالله،%20تواصلت%20معك%20من%20البطاقة%20التعريفية" target="_blank" class="whatsapp-btn">
                        <i class="fab fa-whatsapp"></i> واتساب المباشر
                    </a>
                </div>
            </div>

            <div class="info-row">
                <div class="info-icon"><i class="far fa-envelope"></i></div>
                <div class="info-text">
                    <a href="mailto:abdullah@basqat.com.sa">abdullah@basqat.com.sa</a>
                </div>
            </div>

            <div class="info-row">
                <div class="info-icon"><i class="fas fa-globe"></i></div>
                <div class="info-text">
                    <a href="https://basiqataljazira.com/ar" target="_blank" class="website-link">
                        <i class="fas fa-external-link-alt"></i> اكتشف أكثر
                    </a>
                </div>
            </div>

            <hr />
            <div class="footer-note">
                <i class="fas fa-tree"></i> باسقات الجزيرة للتمور والحلويات
            </div>
        </div>
    </div>

    <script>
        const contactData = {
            fullName: "عبدالله البلوشي",
            phone: "+966555822559",
            email: "abdullah@basqat.com.sa",
            company: "باسقات الجزيرة للتمور والحلويات",
            jobTitle: "منسق المعرض",
            website: "https://basiqataljazira.com/ar"
        };

        function generateVCF() {
            return `BEGIN:VCARD
VERSION:3.0
FN:${contactData.fullName}
ORG:${contactData.company}
TITLE:${contactData.jobTitle}
TEL;TYPE=CELL:${contactData.phone}
EMAIL:${contactData.email}
URL:${contactData.website}
END:VCARD`;
        }

        document.getElementById('saveVcfBtn').addEventListener('click', function () {
            const vcfData = generateVCF();
            const blob = new Blob([vcfData], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'abdullah_basqat.vcf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
